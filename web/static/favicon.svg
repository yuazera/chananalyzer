<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e85a4f"/>
      <stop offset="100%" style="stop-color:#c8372e"/>
    </linearGradient>
  </defs>

  <!-- 外圆 - 代表市场整体 -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#grad)" stroke-width="3"/>

  <!-- 内圆 - 代表走势中枢 -->
  <circle cx="32" cy="32" r="18" fill="url(#grad)" opacity="0.2"/>

  <!-- 螺旋线 - 代表缠论的走势演化 -->
  <path d="M 32 32
           Q 42 22, 42 32
           Q 42 42, 32 42
           Q 22 42, 22 32
           Q 22 22, 32 22
           Q 38 22, 38 32
           Q 38 38, 32 38
           Q 26 38, 26 32
           Q 26 26, 32 26"
        fill="none"
        stroke="url(#grad)"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- 中心点 - 代表核心 -->
  <circle cx="32" cy="32" r="4" fill="#c8372e"/>
</svg>
